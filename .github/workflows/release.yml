name: Release and Publish to npm

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test

      - name: Bump package version
        id: version
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
        run: |
          node <<'EOF'
          const fs = require("fs");

          function bumpVersion(version, type) {
            const [major, minor, patch] = version.split(".").map(Number);
            if (type === "major") return `${major + 1}.0.0`;
            if (type === "minor") return `${major}.${minor + 1}.0`;
            return `${major}.${minor}.${patch + 1}`;
          }

          const type = process.env.RELEASE_TYPE;
          const pkgPath = "package.json";
          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          const version = bumpVersion(pkg.version, type);
          pkg.version = version;
          fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          console.log(`Bumped @lofcz/fortune-excel to ${version}`);
          EOF

      - name: Commit release version and create tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"

      - name: Publish @lofcz/fortune-excel
        run: npm publish --provenance --access public

      - name: Push release commit and tag
        run: git push --follow-tags

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
